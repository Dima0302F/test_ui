name: Run Login Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest selenium webdriver-manager
        pip list  # Показывает установленные пакеты
    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version  # Проверяем версию Chrome
    
    - name: Run tests with maximum verbosity
      run: |
        python --version  # Проверяем версию Python
        pytest test_form.py -vv --tb=long --log-cli-level=DEBUG
      continue-on-error: true  # Продолжаем даже при ошибке тестов
    
    - name: Show test results
      if: always()
      run: |
        echo "=== Current directory contents ==="
        ls -la
        echo "=== Python path ==="
        python -c "import sys; print(sys.path)"
        echo "=== Exit code ==="
        echo $?
